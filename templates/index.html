<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إرسال طلب طباعة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #0d6efd; border: none; border-radius: 10px; padding: 12px; transition: 0.3s; }
        .btn-primary:active { transform: scale(0.98); }
    </style>
</head>
<body class="d-flex align-items-center vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card p-4">
                    <h3 class="text-center mb-4">🖨️ نظام استنساخ الكلية</h3>
                    
                    <form id="uploadForm">
                        <div class="mb-3">
                            <label class="form-label">الاسم الكامل</label>
                            <input type="text" name="student_name" class="form-control" placeholder="اكتب اسمك هنا" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">القسم والمرحلة</label>
                            <input type="text" name="department" class="form-control" placeholder="مثلاً: قانون - مرحلة ثالثة" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold text-primary">اختر الملف</label>
                            <input type="file" name="file" id="fileInput" class="form-control" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,.ppt,.pptx,.xls,.xlsx,.dwg,.txt" required>
                            <small class="text-muted">الحد الأقصى للملف: 1 جيجابايت</small>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">ملاحظات (اختياري)</label>
                            <textarea name="notes" class="form-control" placeholder="وجهين؟ ملون؟ كم نسخة؟" rows="2"></textarea>
                        </div>
                        <button type="submit" id="submitBtn" class="btn btn-primary w-100 fw-bold fs-5">إرسال الطلب الآن</button>
                    </form>
                    
                    <div class="progress mt-3 d-none" id="progressContainer" style="height: 25px;">
                        <div class="progress-bar progress-bar-striped progress-bar-animated fw-bold fs-6" role="progressbar" id="progressBar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">0%</div>
                    </div>
                </div>
                
                <!-- بطاقة المطور -->
                <div class="card mt-4 shadow-sm border-0 bg-white" style="border-radius: 12px;">
                    <div class="card-body text-center p-3">
                        <p class="mb-1 fw-bold text-dark" style="font-size: 0.95rem;">
                            💻 تصميم وتطوير: <span class="text-primary">بلال زامل احمد</span>
                        </p>
                        <p class="text-muted small mb-3">قسم علوم الحاسوب</p>
                        <div class="d-flex justify-content-center gap-3">
                            <a href="https://instagram.com/bilalcodes1" target="_blank" class="btn btn-outline-danger rounded-circle shadow-sm" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; transition: all 0.3s;" onmouseover="this.classList.replace('btn-outline-danger','btn-danger'); this.classList.remove('text-danger');" onmouseout="this.classList.replace('btn-danger','btn-outline-danger');">
                                <i class="bi bi-instagram fs-5"></i>
                            </a>
                            <a href="https://t.me/bilalcodes1" target="_blank" class="btn btn-outline-info rounded-circle shadow-sm" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; transition: all 0.3s;" onmouseover="this.classList.replace('btn-outline-info','btn-info'); this.classList.remove('text-info'); this.classList.add('text-white')" onmouseout="this.classList.replace('btn-info','btn-outline-info'); this.classList.remove('text-white')">
                                <i class="bi bi-telegram fs-5"></i>
                            </a>
                            <a href="mailto:bil24c1055@uoanbar.edu.iq" class="btn btn-outline-secondary rounded-circle shadow-sm" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; transition: all 0.3s;" onmouseover="this.classList.replace('btn-outline-secondary','btn-secondary'); this.classList.remove('text-secondary');" onmouseout="this.classList.replace('btn-secondary','btn-outline-secondary');">
                                <i class="bi bi-envelope fs-5"></i>
                            </a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const container = document.getElementById('progressContainer');
            const bar = document.getElementById('progressBar');
            
            const formData = new FormData(this);
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length > 0 && fileInput.files[0].size > 1073741824) {
                alert('حجم الملف يتجاوز الحد المسموح به (1 جيجابايت).');
                return;
            }
            
            const xhr = new XMLHttpRequest();
            
            xhr.upload.addEventListener('progress', function(e) {
                if (e.lengthComputable) {
                    const percentComplete = Math.round((e.loaded / e.total) * 100);
                    bar.style.width = percentComplete + '%';
                    bar.setAttribute('aria-valuenow', percentComplete);
                    bar.innerHTML = percentComplete + '%';
                }
            });
            
            xhr.addEventListener('load', function() {
                if (xhr.status === 200) {
                    document.open();
                    document.write(xhr.responseText);
                    document.close();
                } else {
                    try {
                        let res = JSON.parse(xhr.responseText);
                        alert(res.message || 'حدث خطأ أثناء الرفع. الرجاء المحاولة مرة أخرى.');
                    } catch(e) {
                        alert('حدث خطأ أثناء الرفع. الرجاء المحاولة مرة أخرى.');
                    }
                    resetForm();
                }
            });
            
            xhr.addEventListener('error', function() {
                alert('حدث خطأ في الاتصال. الرجاء التحقق من الشبكة.');
                resetForm();
            });
            
            xhr.open('POST', '/upload', true);
            
            btn.innerHTML = 'جاري الرفع... يرجى الانتظار ⏳';
            btn.style.opacity = '0.7';
            btn.style.pointerEvents = 'none';
            container.classList.remove('d-none');
            bar.style.width = '0%';
            bar.innerHTML = '0%';
            
            xhr.send(formData);
            
            function resetForm() {
                btn.innerHTML = 'إرسال الطلب الآن';
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
                container.classList.add('d-none');
                bar.style.width = '0%';
                bar.innerHTML = '0%';
            }
        });
    </script>
</body>
</html>
